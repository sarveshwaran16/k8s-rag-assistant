apiVersion: apps/v1
kind: Deployment
metadata:
  name: chroma
  namespace: rag-assistant
spec:
  replicas: 1
  selector:
    matchLabels:
      app: chroma
  template:
    metadata:
      labels:
        app: chroma
    spec:
      containers:
        - name: chroma
          image: chromadb/chroma:0.5.5
          ports:
            - containerPort: 8000
          volumeMounts:
            - name: chroma-storage
              mountPath: /chroma/chroma
      volumes:
        - name: chroma-storage
          persistentVolumeClaim:
            claimName: chroma-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: chroma-service
  namespace: rag-assistant
spec:
  selector:
    app: chroma
  ports:
    - port: 8002
      targetPort: 8000
  type: ClusterIP