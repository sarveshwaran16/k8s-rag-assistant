apiVersion: apps/v1
kind: Deployment
metadata:
  name: embedding
  namespace: rag-assistant
spec:
  replicas: 1
  selector:
    matchLabels:
      app: embedding
  template:
    metadata:
      labels:
        app: embedding
    spec:
      containers:
        - name: embedding
          image: k8s-rag/embedding:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8001
          env:
            - name: EMBED_MODEL
              value: "all-MiniLM-L6-v2"
          resources:
            requests:
              memory: "1Gi"
              cpu: "500m"
            limits:
              memory: "2Gi"
              cpu: "1"
---
apiVersion: v1
kind: Service
metadata:
  name: embedding-service
  namespace: rag-assistant
spec:
  selector:
    app: embedding
  ports:
    - port: 8001
      targetPort: 8001
  type: ClusterIP